backend:
  name: git-gateway
  branch: main

media_folder: "newsletters"
public_folder: "/newsletters"

collections:
  - name: "posts"
    label: "Newsletter Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "MMMM D, YYYY", date_format: "MMMM D, YYYY", time_format: false}
      - {label: "Issue Number", name: "issue", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Backyard Chickens", "Hygge", "Good Reads", "Recipe", "Life", "Garden"]}
      - {label: "Short teaser", name: "excerpt", widget: "text", hint: "1-2 sentences shown on the card — make it inviting!"}
      - label: "Newsletter PDF"
        name: "pdf"
        widget: "file"
        media_folder: "/newsletters"
        public_folder: "/newsletters"
        allow_multiple: false
        required: false
        hint: "Upload the PDF of this newsletter edition"
      - {label: "Extra notes (optional)", name: "body", widget: "markdown", required: false, hint: "Anything extra you want to add below the PDF link"}

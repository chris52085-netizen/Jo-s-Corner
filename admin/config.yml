backend:
  name: git-gateway
  branch: main

media_folder: "newsletters"
public_folder: "/newsletters"

collections:
  - name: "posts"
    label: "Newsletter Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "MMMM D, YYYY", date_format: "MMMM D, YYYY", time_format: false}
      - {label: "Issue Number", name: "issue", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Backyard Chickens", "Hygge", "Good Reads", "Recipe", "Life", "Garden"]}
      - {label: "Short teaser", name: "excerpt", widget: "text"}
      - {label: "Newsletter PDF", name: "pdf", widget: "file", required: false, hint: "Upload the PDF — name it simply with no apostrophes, e.g. jos-corner-issue-12.pdf"}
      - {label: "Extra notes (optional)", name: "body", widget: "markdown", required: false}
